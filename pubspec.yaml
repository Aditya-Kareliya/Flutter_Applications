name: portfolio

description: "A new Flutter project."

version: 0.0.12+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  flutter_web_plugins:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.5+1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.4
  responsive_sizer: ^3.3.1
  device_frame: ^1.4.0
  universal_html: ^2.3.0
  qr_flutter: ^4.1.0
  fl_chart: ^1.1.1
  flutter_svg: ^2.2.3
  share_plus: ^12.0.1
  intl: ^0.20.2
  go_router: ^17.0.1
  image_picker: ^1.1.2
  image: ^4.3.0
  pretty_qr_code: ^3.5.0
  flutter_colorpicker: ^1.1.0
  file_picker: ^10.3.10
  delightful_toast: ^1.1.0
  flutter_tts: ^4.2.2
  audioplayers: ^6.1.0
  auto_size_text: ^3.0.0
  url_strategy: 0.3.0
  firebase_core: ^4.7.0

  # ✅ Added for fixing icon issue
  flutter_launcher_icons: ^0.14.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# ✅ Flutter config
flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/data/gita_shlokas.json


# =========================
# ✅ IMPORTANT: ICON CONFIG
# =========================
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icon.png"